<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상속세 계산기 | CMS v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-purple: #7b2fff;
            --neon-cyan: #00ffcc;
            --deep-bg: #020817;
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: rgba(255, 255, 255, 0.9);
            --text-secondary: rgba(255, 255, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans KR', 'Inter', sans-serif;
            background-image: url('/static/images/space_bg.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text-primary); min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 2rem; overflow-x: hidden;
        }

        #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .shooting-star-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .main-nav-btn {
            position: fixed; top: 1.5rem; right: 1.5rem;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            color: var(--neon-blue); border: 1px solid var(--neon-blue);
            padding: 0.75rem 1.5rem; border-radius: 50px; font-weight: 600; text-decoration: none; font-family: 'Orbitron', sans-serif;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2); transition: 0.3s; z-index: 100;
        }
        .main-nav-btn:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 25px var(--neon-blue); }

        .container {
            background: rgba(2, 8, 23, 0.75); backdrop-filter: blur(25px);
            border-radius: 2rem; border: 1px solid var(--card-border);
            max-width: 1000px; width: 100%; padding: 3.5rem; box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        h1 {
            font-family: 'Orbitron', 'Noto Sans KR', sans-serif; text-align: center; margin-bottom: 2.5rem; font-size: 2.8rem; letter-spacing: 4px;
            background: linear-gradient(90deg, #fff, var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; margin-bottom: 2rem; }
        .form-group { background: rgba(255, 255, 255, 0.02); padding: 1.8rem; border-radius: 1.2rem; border: 1px solid rgba(255, 255, 255, 0.05); }
        .form-group h3 { color: #fff; font-size: 1.05rem; letter-spacing: 1.5px; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; font-weight: 700; }
        
        label { display: block; font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.6rem; }
        input, select { 
            width: 100%; background: #fff; border: 1px solid rgba(0, 0, 0, 0.15); 
            padding: 0.9rem 1.1rem; border-radius: 0.6rem; color: #000 !important; font-size: 1rem; transition: 0.3s;
        }
        input:focus, select:focus { border-color: var(--neon-blue); background: #fdfaf0; outline: none; box-shadow: 0 0 15px rgba(0, 212, 255, 0.2); }
        select option { background: #fff; color: #000; }

        .calc-btn {
            grid-column: span 2; background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            color: white; border: none; padding: 1.3rem; border-radius: 1rem; font-weight: 700; cursor: pointer; 
            font-family: 'Orbitron', 'Noto Sans KR', sans-serif; letter-spacing: 3px; transition: 0.4s;
        }
        .calc-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4); }

        .calc-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4); }

        /* Responsive Optimization */
        @media (max-width: 768px) {
            body { padding: 1rem; }
            .container { padding: 1.5rem; border-radius: 1.5rem; }
            h1 { font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 2rem; }
            .form-grid { grid-template-columns: 1fr; gap: 1.5rem; }
            .calc-btn { grid-column: auto; font-size: 0.9rem; padding: 1.1rem; }
            .result-grid { grid-template-columns: 1fr; }
            .final-result { grid-column: auto; padding: 1.5rem; }
            .final-value { font-size: 2rem; }
            .form-group { padding: 1.2rem; }
            .main-nav-btn { top: 1rem; right: 1rem; padding: 0.5rem 1rem; font-size: 0.7rem; }
        }


    </style>
</head>

<body>
    <canvas id="particle-canvas"></canvas>
    <div class="shooting-star-container" id="shooting-stars"></div>

    <a href="/main" class="main-nav-btn">대시보드 복귀</a>

    <div class="container">
        <h1>상속세 계산기</h1>

        <form id="inheritanceForm">
            <div class="form-grid">
                <div class="form-group" style="background: #fdfaf0; border: 1px solid #e6e1d3;">
                    <h3 style="color: #000;"><span style="color:var(--neon-blue); margin-right:8px;">■</span> 상속 자산 구성</h3>
                    <div style="margin-bottom:1.5rem;">
                        <label style="color: #4a4a4a; font-weight: 600;">총 상속 재산가액 (부동산/예금 등)</label>
                        <input type="text" id="totalAsset" placeholder="0" required>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:1.5rem;">
                        <div>
                            <label style="color: #4a4a4a; font-weight: 600;">금융재산 가액</label>
                            <input type="text" id="financialAsset" value="0">
                        </div>
                        <div>
                            <label style="color: #4a4a4a; font-weight: 600;">사전증여재산 (10년이내)</label>
                            <input type="text" id="preGift" value="0">
                        </div>
                    </div>
                    <div>
                        <label style="color: #4a4a4a; font-weight: 600;">비용 공제 (채무/장례비 등)</label>
                        <input type="text" id="debts" value="0">
                    </div>
                </div>

                <div class="form-group" style="background: #fdfaf0; border: 1px solid #e6e1d3;">
                    <h3 style="color: #000;"><span style="color:var(--neon-blue); margin-right:8px;">■</span> 공제 및 관계</h3>
                    <div style="margin-bottom:1.5rem;">
                        <label style="color: #4a4a4a; font-weight: 600;">배우자 상속 여부</label>
                        <select id="spousePresence">
                            <option value="yes">배우자 있음 (최소 5억 공제)</option>
                            <option value="no">배우자 없음</option>
                        </select>
                    </div>
                    <div style="margin-bottom:1.5rem;">
                        <label style="color: #4a4a4a; font-weight: 600;">실제 배우자 상속분 (원)</label>
                        <input type="text" id="spouseAsset" value="0">
                    </div>
                    <div>
                        <label style="color: #4a4a4a; font-weight: 600;">추정상속재산 (사용처불분명)</label>
                        <input type="text" id="estimatedAsset" value="0">
                    </div>
                </div>

                <button type="submit" class="calc-btn">상속세 정밀 분석 // ANALYZE</button>
            </div>
        </form>

        <div id="inheritanceResult" class="result-container">
            <div class="result-grid">
                <div class="result-item">
                    <div class="result-label">배우자 공제 여부</div>
                    <div id="res-spouse-presence" class="result-value">-</div>
                </div>
                <div class="result-item">
                    <div class="result-label">배우자 상속공제액</div>
                    <div id="res-spouse-deduction" class="result-value">0 원</div>
                </div>
                <div class="result-item">
                    <div class="result-label">과세표준</div>
                    <div class="result-value" id="res-tax-base" style="color: var(--neon-purple)">-</div>
                </div>
                <div class="final-result">
                    <div class="final-label">예상 상속세 합계 (세전)</div>
                    <div id="res-total-tax" class="final-value">0 원</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // High-Vibrancy Space Collision Engine
        (function() {
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            let w, h, particles = [];

            function init() {
                w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
                particles = [];
                for(let i=0; i<120; i++) particles.push(new Particle('star'));
                for(let i=0; i<25; i++) particles.push(new Particle('asteroid'));
            }

            class Particle {
                constructor(type, x, y, r, sx, sy) {
                    this.type = type;
                    if(x) { this.x = x; this.y = y; this.r = r; this.speedX = sx; this.speedY = sy; }
                    else { this.reset(); }
                }
                reset() {
                    this.x = Math.random() * w; this.y = Math.random() * h;
                    this.r = this.type === 'star' ? Math.random() * 1.5 + 0.3 : Math.random() * 5 + 1.5;
                    // Asteroids move mostly right (consistent positive flow)
                    this.speedX = this.type === 'star' ? (Math.random() - 0.5) * 0.12 : (Math.random() * 0.5 + 0.4);
                    this.speedY = this.type === 'star' ? Math.random() * 0.2 + 0.1 : (Math.random() * 0.4 - 0.2);
                    this.opacity = Math.random() * 0.7 + 0.2;
                    this.color = this.type === 'star' ? '#ffffff' : '#64748b';
                    this.rotation = Math.random() * Math.PI * 2;
                    this.rotationSpeed = (Math.random() - 0.5) * 0.045;
                    this.pulse = Math.random() * Math.PI;
                    this.pulseSpeed = Math.random() * 0.04 + 0.015;
                    this.life = this.type === 'fragment' ? 100 : 1;
                }
                update() {
                    this.x += this.speedX; this.y -= this.speedY;
                    this.rotation += this.rotationSpeed; this.pulse += this.pulseSpeed;
                    if(this.type === 'fragment') { this.life -= 2; this.opacity -= 0.02; }
                    else {
                        if (this.y < -30) this.y = h + 30; if (this.x > w + 30) this.x = -30;
                        if (this.x < -30) this.x = w + 30; if (this.y > h + 30) this.y = -30;
                    }
                }
                draw() {
                    if(this.opacity <= 0) return;
                    ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rotation);
                    ctx.beginPath();
                    if(this.type === 'asteroid') {
                        ctx.moveTo(0, -this.r); ctx.lineTo(this.r, -this.r*0.4); ctx.lineTo(this.r*0.7, this.r*0.7); ctx.lineTo(-this.r*0.6, this.r); ctx.lineTo(-this.r, 0);
                    } else { ctx.arc(0, 0, this.r, 0, Math.PI * 2); }
                    ctx.fillStyle = this.color; ctx.globalAlpha = this.opacity; ctx.fill();
                    ctx.restore();
                }
            }

            function checkCollisions() {
                for (let i = 0; i < particles.length; i++) {
                    if (particles[i].type !== 'asteroid') continue;
                    for (let j = i + 1; j < particles.length; j++) {
                        if (particles[j].type !== 'asteroid') continue;
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < (particles[i].r + particles[j].r)) {
                            createExplosion(particles[i].x, particles[i].y);
                            particles[i].reset(); particles[j].reset();
                        }
                    }
                }
            }

            function createExplosion(x, y) {
                for(let i=0; i<8; i++) {
                    const sx = (Math.random() - 0.5) * 6; const sy = (Math.random() - 0.5) * 6;
                    particles.push(new Particle('fragment', x, y, Math.random()*2, sx, sy));
                }
            }

            function animate() {
                ctx.clearRect(0, 0, w, h);
                checkCollisions();
                particles = particles.filter(p => (p.type !== 'fragment' || p.life > 0));
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            setInterval(() => {
                const container = document.getElementById('shooting-stars');
                if(!container) return;
                const star = document.createElement('div');
                star.style.position = 'absolute'; star.style.width = '2px'; star.style.height = '2px';
                star.style.background = '#fff'; star.style.boxShadow = '0 0 10px #fff'; star.style.borderRadius = '50%';
                const startX = Math.random() * window.innerWidth;
                const startY = Math.random() * window.innerHeight * 0.5;
                const duration = Math.random() * 1000 + 850;
                star.style.left = startX + 'px'; star.style.top = startY + 'px'; star.style.opacity = '1';
                star.style.transition = `all ${duration}ms linear`;
                container.appendChild(star);
                setTimeout(() => { star.style.left = (startX + 600) + 'px'; star.style.top = (startY + 600) + 'px'; star.style.opacity = '0'; star.style.width = '120px'; star.style.transform = 'rotate(-45deg)'; }, 20);
                setTimeout(() => { if(container.contains(star)) container.removeChild(star); }, duration + 100);
            }, 3500);
            window.addEventListener('resize', init); init(); animate();
        })();

        // Calc Logic
        function addComma(x) { return x.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ","); }
        function removeComma(x) { return x.replace(/,/g, ""); }

        const inputIds = ['totalAsset', 'debts', 'spouseAsset', 'financialAsset', 'preGift', 'estimatedAsset'];
        inputIds.forEach(id => {
            const el = document.getElementById(id);
            if(el) {
                el.addEventListener('input', () => {
                    let v = el.value.replace(/[^\d]/g, '');
                    el.value = v ? addComma(v) : '';
                });
            }
        });

        document.getElementById('inheritanceForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const total = parseInt(removeComma(document.getElementById('totalAsset').value)) || 0;
            const financeAsset = parseInt(removeComma(document.getElementById('financialAsset').value)) || 0;
            const preGift = parseInt(removeComma(document.getElementById('preGift').value)) || 0;
            const debt = parseInt(removeComma(document.getElementById('debts').value)) || 0;
            const spouseAct = parseInt(removeComma(document.getElementById('spouseAsset').value)) || 0;
            const estimated = parseInt(removeComma(document.getElementById('estimatedAsset').value)) || 0;
            const spouseOn = document.getElementById('spousePresence').value;

            // 1. 과세가액 산정 (자산 + 사전증여 + 추정재산 - 비용)
            const grossAsset = total + preGift + estimated - debt;

            // 2. 일괄공제 (기본 5억)
            let basicDed = 500000000;
            
            // 3. 배우자 공제 (최소 5억 ~ 최대 30억)
            let spouseDed = 0;
            if(spouseOn === 'yes') {
                spouseDed = Math.max(500000000, Math.min(spouseAct, 3000000000));
            }

            // 4. 금융재산 상속공제 (20%, 최대 2억)
            let financeDed = 0;
            if(financeAsset > 20000000) {
                financeDed = Math.min(financeAsset * 0.2, 200000000);
                if(financeDed < 20000000) financeDed = 20000000;
            }

            // 5. 과세표준
            const taxBase = Math.max(0, grossAsset - basicDed - spouseDed - financeDed);
            
            // 6. 세율 적용 (누진세율)
            let rate = 0, stepDed = 0;
            if(taxBase <= 100000000) { rate = 0.1; stepDed = 0; }
            else if(taxBase <= 500000000) { rate = 0.2; stepDed = 10000000; }
            else if(taxBase <= 1000000000) { rate = 0.3; stepDed = 60000000; }
            else if(taxBase <= 3000000000) { rate = 0.4; stepDed = 160000000; }
            else { rate = 0.5; stepDed = 460000000; }

            const tax = (taxBase * rate) - stepDed;

            document.getElementById('res-spouse-presence').textContent = spouseOn === 'yes' ? '공제 대상' : '없음';
            document.getElementById('res-spouse-deduction').textContent = addComma(spouseDed + financeDed + basicDed) + ' 원 (총 공제)';
            document.getElementById('res-tax-base').textContent = addComma(taxBase) + ' 원';
            document.getElementById('res-total-tax').textContent = addComma(Math.max(0, Math.round(tax))) + ' 원';
            
            document.getElementById('inheritanceResult').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        });
    </script>
</body>
</html>
