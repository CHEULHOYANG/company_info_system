<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4대보험 계산기 | CMS v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-purple: #7b2fff;
            --neon-cyan: #00ffcc;
            --deep-bg: #020817;
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: rgba(255, 255, 255, 0.9);
            --text-secondary: rgba(255, 255, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans KR', 'Inter', sans-serif;
            background-image: url('/static/images/space_bg.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text-primary); min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 2rem; overflow-x: hidden;
        }

        #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .shooting-star-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .main-nav-btn {
            position: fixed; top: 1.5rem; right: 1.5rem;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            color: var(--neon-blue); border: 1px solid var(--neon-blue);
            padding: 0.75rem 1.5rem; border-radius: 50px; font-weight: 600; text-decoration: none; font-family: 'Orbitron', sans-serif;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2); transition: 0.3s; z-index: 100;
        }
        .main-nav-btn:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 25px var(--neon-blue); }

        .container {
            background: rgba(2, 8, 23, 0.75); backdrop-filter: blur(25px);
            border-radius: 2rem; border: 1px solid var(--card-border);
            max-width: 900px; width: 100%; padding: 3.5rem; box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        h1 {
            font-family: 'Orbitron', 'Noto Sans KR', sans-serif; text-align: center; margin-bottom: 2.5rem; font-size: 2.8rem; letter-spacing: 4px;
            background: linear-gradient(90deg, #fff, var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .form-group { background: rgba(255, 255, 255, 0.02); padding: 2rem; border-radius: 1.5rem; border: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 2rem; }
        .form-group h3 { color: var(--neon-cyan); font-size: 1.05rem; letter-spacing: 1.5px; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; font-weight: 700; }
        
        label { display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.6rem; }
        input, select { 
            width: 100%; background: #fff !important; border: 1px solid rgba(0, 0, 0, 0.2); 
            padding: 1 plan.1rem; border-radius: 0.8rem; color: #000 !important; font-size: 1.1rem; transition: 0.3s; text-align: center;
        }
        input:focus, select:focus { border-color: var(--neon-blue); background: #fdfaf0 !important; outline: none; box-shadow: 0 0 15px rgba(0, 212, 255, 0.2); }
        select option { background: #fff; color: #000; }

        .calc-btn {
            width: 100%; background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            color: white; border: none; padding: 1.3rem; border-radius: 1rem; font-weight: 700; cursor: pointer; 
            font-family: 'Orbitron', 'Noto Sans KR', sans-serif; letter-spacing: 3px; transition: 0.4s;
        }
        .calc-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4); }

        .result-container { margin-top: 2.5rem; display: none; animation: fadeInUp 0.6s ease forwards; }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .result-item { background: rgba(255, 255, 255, 0.03); padding: 1.5rem; border-radius: 1.2rem; border: 1px solid rgba(255, 255, 255, 0.05); }
        .result-label { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.4rem; }
        .result-value { font-size: 1.2rem; font-weight: 600; }

        .final-result {
            grid-column: span 2; background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(123, 47, 255, 0.1));
            border: 1px solid var(--neon-blue); padding: 2.5rem; text-align: center; border-radius: 1.5rem;
        }
        .final-label { color: var(--neon-blue); font-family: 'Orbitron', sans-serif; font-size: 1rem; letter-spacing: 3px; }
        .final-value { font-size: 3.5rem; font-weight: 900; background: linear-gradient(90deg, #fff, var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-top: 0.5rem; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .info-box { background: rgba(255, 255, 255, 0.05); border-left: 4px solid var(--neon-blue); padding: 1.5rem; margin-top: 2rem; font-size: 0.85rem; line-height: 1.6; color: var(--text-primary); border-radius: 0.5rem; }
        .info-box ul { padding-left: 1.2rem; margin-top: 0.5rem; }
        .info-title { color: var(--neon-blue); font-weight: 700; margin-bottom: 0.5rem; display: block; }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            .container { padding: 1.5rem; border-radius: 1.5rem; }
            h1 { font-size: 1.8rem; letter-spacing: 2px; }
            .result-grid { grid-template-columns: 1fr; }
            .final-result { grid-column: auto; padding: 1.5rem; }
            .final-value { font-size: 2.2rem; }
            .main-nav-btn { top: 1rem; right: 1rem; padding: 0.5rem 1rem; font-size: 0.7rem; }
        }


    </style>
</head>

<body>
    <canvas id="particle-canvas"></canvas>
    <div class="shooting-star-container" id="shooting-stars"></div>

    <a href="/main" class="main-nav-btn">대시보드 복귀</a>

    <div class="container">
        <h1>4대보험 계산기</h1>

        <form id="insuranceForm">
            <div class="form-group" style="background: #fdfaf0; border: 1px solid #e6e1d3;">
                <h3 style="color: #000;"><span style="color:var(--neon-cyan); margin-right:8px;">■</span> 가입 대상 구분</h3>
                <select id="userType" style="margin-bottom: 1.5rem;">
                    <option value="worker">일반 근로자 (직장가입자)</option>
                    <option value="biz_personal">개인사업자-직원無 (지역가입자)</option>
                    <option value="biz_staffed">개인사업자-직원有 (직장가입자)</option>
                    <option value="corp_1man">1인 법인 대표 (급여 수령)</option>
                </select>

                <h3 style="color: #000;"><span style="color:var(--neon-cyan); margin-right:8px;">■</span> 소득/자산 정보</h3>
                <div id="incomeArea">
                    <label style="color: #4a4a4a; font-weight: 600;">월 소득/급여액 (원)</label>
                    <input type="text" id="monthlySalary" placeholder="0" required>
                </div>
                
                <div id="regionalArea" style="display: none; margin-top: 1.5rem;">
                    <div style="margin-bottom: 1rem;">
                        <label style="color: #4a4a4a; font-weight: 600;">재산세 과세표준 총계 (원)</label>
                        <input type="text" id="propertyValue" placeholder="부동산/토지 등">
                    </div>
                    <div>
                        <label style="color: #4a4a4a; font-weight: 600;">자동차 배기량 (cc)</label>
                        <input type="number" id="carCc" placeholder="예: 2000">
                    </div>
                </div>
            </div>
            <button type="submit" class="calc-btn">보험료 정밀 산출 // ANALYZE</button>
        </form>

        <div id="insuranceResult" class="result-container">
            <div class="result-grid">
                <div class="result-item">
                    <div class="result-label" id="label-pension">국민연금</div>
                    <div id="res-pension" class="result-value">0 원</div>
                </div>
                <div class="result-item">
                    <div class="result-label" id="label-health">건강보험</div>
                    <div id="res-health" class="result-value">0 원</div>
                </div>
                <div class="result-item">
                    <div class="result-label" id="label-longterm">장기요양</div>
                    <div id="res-longterm" class="result-value">0 원</div>
                </div>
                <div class="result-item">
                    <div class="result-label" id="label-employment">고용보험</div>
                    <div id="res-employment" class="result-value">0 원</div>
                </div>
                <div class="final-result">
                    <div class="final-label" id="label-total">납부 예상 합계</div>
                    <div id="res-total" class="final-value">0 원</div>
                </div>
            </div>

            <div class="info-box">
                <span class="info-title">💡 계산 방식 안내</span>
                <ul id="calc-desc">
                    <li>일반 근로자: 월 급여 기준 요율(연금 9%, 건보 7.09% 등)의 50%를 본인이 부담합니다.</li>
                    <li>개인사업자(지역): 소득뿐만 아니라 재산(공시지가 등) 및 자동차 점수를 합산하여 산정됩니다.</li>
                    <li>1인 법인 대표: 고용/산재보험 가입 의무가 없으며, 건강보험과 국민연금만 급여 기준으로 납부합니다.</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        // High-Vibrancy Space Collision Engine
        (function() {
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            let w, h, particles = [];

            function init() {
                w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
                particles = [];
                for(let i=0; i<120; i++) particles.push(new Particle('star'));
                for(let i=0; i<25; i++) particles.push(new Particle('asteroid'));
            }

            class Particle {
                constructor(type, x, y, r, sx, sy) {
                    this.type = type;
                    if(x) { this.x = x; this.y = y; this.r = r; this.speedX = sx; this.speedY = sy; }
                    else { this.reset(); }
                }
                reset() {
                    this.x = Math.random() * w; this.y = Math.random() * h;
                    this.r = this.type === 'star' ? Math.random() * 1.5 + 0.3 : Math.random() * 5 + 1.5;
                    // Asteroids move mostly right (consistent flow)
                    this.speedX = this.type === 'star' ? (Math.random() - 0.5) * 0.12 : (Math.random() * 0.5 + 0.4);
                    this.speedY = this.type === 'star' ? Math.random() * 0.2 + 0.1 : (Math.random() * 0.4 - 0.2);
                    this.opacity = Math.random() * 0.7 + 0.2;
                    this.color = this.type === 'star' ? '#ffffff' : '#64748b';
                    this.rotation = Math.random() * Math.PI * 2;
                    this.rotationSpeed = (Math.random() - 0.5) * 0.045;
                    this.pulse = Math.random() * Math.PI;
                    this.pulseSpeed = Math.random() * 0.04 + 0.015;
                    this.life = this.type === 'fragment' ? 100 : 1;
                }
                update() {
                    this.x += this.speedX; this.y -= this.speedY;
                    this.rotation += this.rotationSpeed; this.pulse += this.pulseSpeed;
                    if(this.type === 'fragment') { this.life -= 2; this.opacity -= 0.02; }
                    else {
                        if (this.y < -30) this.y = h + 30; if (this.x > w + 30) this.x = -30;
                        if (this.x < -30) this.x = w + 30; if (this.y > h + 30) this.y = -30;
                    }
                }
                draw() {
                    if(this.opacity <= 0) return;
                    ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rotation);
                    ctx.beginPath();
                    if(this.type === 'asteroid') {
                        ctx.moveTo(0, -this.r); ctx.lineTo(this.r, -this.r*0.4); ctx.lineTo(this.r*0.7, this.r*0.7); ctx.lineTo(-this.r*0.6, this.r); ctx.lineTo(-this.r, 0);
                    } else { ctx.arc(0, 0, this.r, 0, Math.PI * 2); }
                    ctx.fillStyle = this.color; ctx.globalAlpha = this.opacity; ctx.fill();
                    ctx.restore();
                }
            }

            function checkCollisions() {
                for (let i = 0; i < particles.length; i++) {
                    if (particles[i].type !== 'asteroid') continue;
                    for (let j = i + 1; j < particles.length; j++) {
                        if (particles[j].type !== 'asteroid') continue;
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < (particles[i].r + particles[j].r)) {
                            createExplosion(particles[i].x, particles[i].y);
                            particles[i].reset(); particles[j].reset();
                        }
                    }
                }
            }

            function createExplosion(x, y) {
                for(let i=0; i<8; i++) {
                    const sx = (Math.random() - 0.5) * 6; const sy = (Math.random() - 0.5) * 6;
                    particles.push(new Particle('fragment', x, y, Math.random()*2, sx, sy));
                }
            }

            function animate() {
                ctx.clearRect(0, 0, w, h);
                checkCollisions();
                particles = particles.filter(p => (p.type !== 'fragment' || p.life > 0));
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            setInterval(() => {
                const container = document.getElementById('shooting-stars');
                if(!container) return;
                const star = document.createElement('div');
                star.style.position = 'absolute'; star.style.width = '2px'; star.style.height = '2px';
                star.style.background = '#fff'; star.style.boxShadow = '0 0 10px #fff'; star.style.borderRadius = '50%';
                const startX = Math.random() * window.innerWidth;
                const startY = Math.random() * window.innerHeight * 0.5;
                const duration = Math.random() * 1000 + 850;
                star.style.left = startX + 'px'; star.style.top = startY + 'px'; star.style.opacity = '1';
                star.style.transition = `all ${duration}ms linear`;
                container.appendChild(star);
                setTimeout(() => { star.style.left = (startX + 600) + 'px'; star.style.top = (startY + 600) + 'px'; star.style.opacity = '0'; star.style.width = '120px'; star.style.transform = 'rotate(-45deg)'; }, 20);
                setTimeout(() => { if(container.contains(star)) container.removeChild(star); }, duration + 100);
            }, 3500);
            window.addEventListener('resize', init); init(); animate();
        })();

        function addComma(x) { return x.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ","); }
        function removeComma(x) { return x.replace(/,/g, ""); }

        const salaryInput = document.getElementById('monthlySalary');
        const userTypeSelect = document.getElementById('userType');
        const regionalArea = document.getElementById('regionalArea');
        const propInput = document.getElementById('propertyValue');

        userTypeSelect.addEventListener('change', () => {
            if(userTypeSelect.value === 'biz_personal') {
                regionalArea.style.display = 'block';
            } else {
                regionalArea.style.display = 'none';
            }
        });

        [salaryInput, propInput].forEach(el => {
            el.addEventListener('input', () => {
                let val = el.value.replace(/[^\d]/g, '');
                el.value = val ? addComma(val) : '';
            });
        });

        document.getElementById('insuranceForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const salary = parseInt(removeComma(salaryInput.value)) || 0;
            const type = userTypeSelect.value;
            const property = parseInt(removeComma(propInput.value)) || 0;
            const car = parseInt(document.getElementById('carCc').value) || 0;

            if (!salary) return alert('소득/급여액을 입력하세요.');

            let pension = 0, health = 0, longterm = 0, employment = 0;
            let desc = "";

            if (type === 'worker' || type === 'biz_staffed') {
                // 직장가입자 (50% 부담)
                pension = Math.floor(Math.min(salary, 5900000) * 0.045);
                health = Math.floor(salary * 0.03545);
                longterm = Math.floor(health * 0.1295);
                employment = Math.floor(salary * 0.009);
                desc = "<li>직장가입자 기준: 본인 부담분(50%)만 계산되었습니다.</li><li>사업주 부담분을 포함한 총 보험료는 위 금액의 약 2배입니다.</li>";
            } else if (type === 'corp_1man') {
                // 1인 법인 대표 (고용보험 제외)
                pension = Math.floor(Math.min(salary, 5900000) * 0.045);
                health = Math.floor(salary * 0.03545);
                longterm = Math.floor(health * 0.1295);
                employment = 0;
                desc = "<li>법인 대표: 고용/산재보험 가입 의무가 없어 제외되었습니다.</li><li>법인 비용(50%)과 본인 부담(50%) 중 본인분만 표시됩니다.</li>";
            } else if (type === 'biz_personal') {
                // 지역가입자 (소득 + 자산 점수제 시뮬레이션 - 24년 기준 간소화)
                const incomePoint = (salary * 12) / 1000000 * 15; // 간이 점수화
                const assetPoint = (property / 10000000) * 5;
                const carPoint = car > 1600 ? 50 : 0;
                const totalPoints = incomePoint + assetPoint + carPoint;
                
                pension = Math.floor(Math.min(salary, 5900000) * 0.09); // 지역은 100% 본인부담
                health = Math.floor(totalPoints * 208.4); // 점수당 단가 약 208원
                longterm = Math.floor(health * 0.1295);
                employment = 0;
                desc = "<li>지역가입자: 사업주 부담 없이 본인이 100% 납부합니다.</li><li>재산/자동차 점수가 포함되어 고지서와 차이가 있을 수 있습니다.</li>";
            }

            document.getElementById('res-pension').textContent = addComma(pension) + ' 원';
            document.getElementById('res-health').textContent = addComma(health) + ' 원';
            document.getElementById('res-longterm').textContent = addComma(longterm) + ' 원';
            document.getElementById('res-employment').textContent = addComma(employment) + ' 원';
            document.getElementById('res-total').textContent = addComma(pension + health + longterm + employment) + ' 원';
            document.getElementById('calc-desc').innerHTML = desc;
            
            document.getElementById('insuranceResult').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        });
    </script>
</body>
</html>
