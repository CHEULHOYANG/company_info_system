<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>양도소득세 계산기 | CMS v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-purple: #7b2fff;
            --neon-cyan: #00ffcc;
            --deep-bg: #020817;
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: rgba(255, 255, 255, 0.9);
            --text-secondary: rgba(255, 255, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans KR', 'Inter', sans-serif;
            background-image: url('/static/images/space_bg.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text-primary); min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 2rem; overflow-x: hidden;
        }

        #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .shooting-star-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .main-nav-btn {
            position: fixed; top: 1.5rem; right: 1.5rem;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            color: var(--neon-blue); border: 1px solid var(--neon-blue);
            padding: 0.75rem 1.5rem; border-radius: 50px; font-weight: 600; text-decoration: none; font-family: 'Orbitron', sans-serif;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2); transition: 0.3s; z-index: 100;
        }
        .main-nav-btn:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 25px var(--neon-blue); }

        .container {
            background: rgba(2, 8, 23, 0.75); backdrop-filter: blur(25px);
            border-radius: 2rem; border: 1px solid var(--card-border);
            max-width: 1000px; width: 100%; padding: 3.5rem; box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        h1 {
            font-family: 'Orbitron', 'Noto Sans KR', sans-serif; text-align: center; margin-bottom: 2.5rem; font-size: 2.8rem; letter-spacing: 4px;
            background: linear-gradient(90deg, #fff, var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem; }
        .form-group { background: rgba(255, 255, 255, 0.02); padding: 1.8rem; border-radius: 1.2rem; border: 1px solid rgba(255, 255, 255, 0.05); }
        .form-group h3 { color: #fff; font-size: 1.05rem; letter-spacing: 1.5px; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; font-weight: 700; }
        
        label { display: block; font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.6rem; }
        input, select { 
            width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 0.9rem 1.1rem; border-radius: 0.6rem; color: white; font-size: 1rem; transition: 0.3s;
        }
        input:focus { border-color: var(--neon-blue); background: rgba(255, 255, 255, 0.08); outline: none; box-shadow: 0 0 15px rgba(0, 212, 255, 0.2); }
        select option { background: #020817; color: white; }

        .calc-btn {
            grid-column: span 2; background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            color: white; border: none; padding: 1.3rem; border-radius: 1rem; font-weight: 700; cursor: pointer; 
            font-family: 'Orbitron', 'Noto Sans KR', sans-serif; letter-spacing: 3px; transition: 0.4s;
        }
        .calc-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4); }

        .result-container { margin-top: 2.5rem; display: none; animation: fadeInUp 0.6s ease forwards; }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .result-item { background: rgba(255, 255, 255, 0.03); padding: 1.5rem; border-radius: 1.2rem; border: 1px solid rgba(255, 255, 255, 0.05); }
        .result-label { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.4rem; }
        .result-value { font-size: 1.2rem; font-weight: 600; }

        .final-result {
            grid-column: span 2; background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(123, 47, 255, 0.1));
            border: 1px solid var(--neon-blue); padding: 2.5rem; text-align: center; border-radius: 1.5rem;
        }
        .final-label { color: var(--neon-blue); font-family: 'Orbitron', sans-serif; font-size: 1rem; letter-spacing: 3px; }
        .final-value {
            font-size: 3.5rem; font-weight: 900; background: linear-gradient(90deg, #fff, var(--neon-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-top: 0.5rem;
        }
        @media (max-width: 768px) { h1 { font-size: 2rem; } .form-grid { grid-template-columns: 1fr; } .container { padding: 2rem; } }
    </style>
</head>

<body>
    <canvas id="particle-canvas"></canvas>
    <div class="shooting-star-container" id="shooting-stars"></div>
    <div class="earth-container">
        <img src="https://images.rawpixel.com/image_png_800/cHJpdmF0ZS9sci9pbWFnZXMvd2Vic2l0ZS8yMDIzLTA4L3Jhd3BpeGVsX29mZmljZV8yNF9waG90b19vZl9lYXJ0aF9mcm9tX3NwYWNlX2lzb2xhdGVkX29uX3RyYW5zcGFyZW50X2JhXzkzNTY3MjFhLTk1NDQtNGVjMi1hYzRjLTZlODQzMWU0MzlhYl8xLnBuZw.png" class="earth-img" alt="Earth Rotation Element">
    </div>
    <a href="/main" class="main-nav-btn">대시보드 복귀</a>

    <div class="container">
        <h1>양도소득세 계산기</h1>

        <form id="transferForm">
            <div class="form-grid">
                <div class="form-group">
                    <h3><span style="color:var(--neon-blue); margin-right:8px;">■</span> 자산 정보</h3>
                    <div style="margin-bottom:1.2rem;">
                        <label>자산 종류</label>
                        <select id="assetType">
                            <option value="house1">1세대 1주택 (비과세 요건 확인)</option>
                            <option value="houseMulti">다주택자 (주택)</option>
                            <option value="land">기타 부동산 (토지/상가)</option>
                        </select>
                    </div>
                    <div style="margin-bottom:1.2rem;">
                        <label>양도가액 (원)</label>
                        <input type="text" id="transferPrice" placeholder="0" required>
                    </div>
                    <div>
                        <label>취득가액 (원)</label>
                        <input type="text" id="acquisitionPrice" placeholder="0" required>
                    </div>
                </div>

                <div class="form-group">
                    <h3><span style="color:var(--neon-blue); margin-right:8px;">■</span> 추가 정보</h3>
                    <div style="margin-bottom:1.2rem;">
                        <label>보유 기간 (년)</label>
                        <input type="number" id="holdingYears" value="1" min="0">
                    </div>
                    <div style="margin-bottom:1.2rem;">
                        <label>거주 기간 (년) - 1주택자 해당</label>
                        <input type="number" id="residentYears" value="0" min="0">
                    </div>
                    <div>
                        <label>필요 경비 (원)</label>
                        <input type="text" id="necessaryExpenses" value="0">
                    </div>
                </div>

                <button type="submit" class="calc-btn">계산하기 // ANALYZE</button>
            </div>
        </form>

        <div id="transferResult" class="result-container">
            <div class="result-grid">
                <div class="result-item">
                    <div class="result-label">자산 유형</div>
                    <div id="res-asset-type" class="result-value">-</div>
                </div>
                <div class="result-item">
                    <div class="result-label">양도 차익</div>
                    <div id="res-profit" class="result-value">0 원</div>
                </div>
                <div class="result-item">
                    <div class="result-label">장기보유 특별공제</div>
                    <div id="res-longterm-deduction" class="result-value">0 원</div>
                </div>
                <div class="result-item">
                    <div class="result-label">과세 표준</div>
                    <div id="res-tax-base" class="result-value">0 원</div>
                </div>

                <div class="final-result">
                    <div class="final-label">최종 납부 세액 (지방세 포함 예상)</div>
                    <div id="res-total-tax" class="final-value">0 원</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // High-Vibrancy Space Collision Engine
        (function() {
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            let w, h, particles = [];

            function init() {
                w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
                particles = [];
                for(let i=0; i<120; i++) particles.push(new Particle('star'));
                for(let i=0; i<25; i++) particles.push(new Particle('asteroid'));
            }

            class Particle {
                constructor(type, x, y, r, sx, sy) {
                    this.type = type;
                    if(x) { this.x = x; this.y = y; this.r = r; this.speedX = sx; this.speedY = sy; }
                    else { this.reset(); }
                }
                reset() {
                    this.x = Math.random() * w; this.y = Math.random() * h;
                    this.r = this.type === 'star' ? Math.random() * 1.5 + 0.3 : Math.random() * 5 + 1.5;
                    // Asteroids move mostly right (consistent flow)
                    this.speedX = this.type === 'star' ? (Math.random() - 0.5) * 0.12 : (Math.random() * 0.5 + 0.4);
                    this.speedY = this.type === 'star' ? Math.random() * 0.2 + 0.1 : (Math.random() * 0.4 - 0.2);
                    this.opacity = Math.random() * 0.7 + 0.2;
                    this.color = this.type === 'star' ? '#ffffff' : '#64748b';
                    this.rotation = Math.random() * Math.PI * 2;
                    this.rotationSpeed = (Math.random() - 0.5) * 0.045;
                    this.pulse = Math.random() * Math.PI;
                    this.pulseSpeed = Math.random() * 0.04 + 0.015;
                    this.life = this.type === 'fragment' ? 100 : 1;
                }
                update() {
                    this.x += this.speedX; this.y -= this.speedY;
                    this.rotation += this.rotationSpeed; this.pulse += this.pulseSpeed;
                    if(this.type === 'fragment') { this.life -= 2; this.opacity -= 0.02; }
                    else {
                        if (this.y < -30) this.y = h + 30; if (this.x > w + 30) this.x = -30;
                        if (this.x < -30) this.x = w + 30; if (this.y > h + 30) this.y = -30;
                    }
                }
                draw() {
                    if(this.opacity <= 0) return;
                    ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rotation);
                    ctx.beginPath();
                    if(this.type === 'asteroid') {
                        ctx.moveTo(0, -this.r); ctx.lineTo(this.r, -this.r*0.4); ctx.lineTo(this.r*0.7, this.r*0.7); ctx.lineTo(-this.r*0.6, this.r); ctx.lineTo(-this.r, 0);
                    } else { ctx.arc(0, 0, this.r, 0, Math.PI * 2); }
                    ctx.fillStyle = this.color; ctx.globalAlpha = this.opacity; ctx.fill();
                    ctx.restore();
                }
            }

            function checkCollisions() {
                for (let i = 0; i < particles.length; i++) {
                    if (particles[i].type !== 'asteroid') continue;
                    for (let j = i + 1; j < particles.length; j++) {
                        if (particles[j].type !== 'asteroid') continue;
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < (particles[i].r + particles[j].r)) {
                            createExplosion(particles[i].x, particles[i].y);
                            particles[i].reset(); particles[j].reset();
                        }
                    }
                }
            }

            function createExplosion(x, y) {
                for(let i=0; i<8; i++) {
                    const sx = (Math.random() - 0.5) * 6; const sy = (Math.random() - 0.5) * 6;
                    particles.push(new Particle('fragment', x, y, Math.random()*2, sx, sy));
                }
            }

            function animate() {
                ctx.clearRect(0, 0, w, h);
                checkCollisions();
                particles = particles.filter(p => (p.type !== 'fragment' || p.life > 0));
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            setInterval(() => {
                const container = document.getElementById('shooting-stars');
                if(!container) return;
                const star = document.createElement('div');
                star.style.position = 'absolute'; star.style.width = '2px'; star.style.height = '2px';
                star.style.background = '#fff'; star.style.boxShadow = '0 0 10px #fff'; star.style.borderRadius = '50%';
                const startX = Math.random() * window.innerWidth;
                const startY = Math.random() * window.innerHeight * 0.5;
                const duration = Math.random() * 1000 + 850;
                star.style.left = startX + 'px'; star.style.top = startY + 'px'; star.style.opacity = '1';
                star.style.transition = `all ${duration}ms linear`;
                container.appendChild(star);
                setTimeout(() => { star.style.left = (startX + 600) + 'px'; star.style.top = (startY + 600) + 'px'; star.style.opacity = '0'; star.style.width = '120px'; star.style.transform = 'rotate(-45deg)'; }, 20);
                setTimeout(() => { if(container.contains(star)) container.removeChild(star); }, duration + 100);
            }, 4000);
            window.addEventListener('resize', init); init(); animate();
        })();

        // Calc Logic
        function addComma(x) { return x.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ","); }
        function removeComma(x) { return x.replace(/,/g, ""); }

        const priceInputs = ['transferPrice', 'acquisitionPrice', 'necessaryExpenses'];
        priceInputs.forEach(id => {
            const el = document.getElementById(id);
            if(el) {
                el.addEventListener('input', () => {
                    let v = el.value.replace(/[^\d]/g, '');
                    el.value = v ? addComma(v) : '';
                });
            }
        });

        document.getElementById('transferForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const trans = parseInt(removeComma(document.getElementById('transferPrice').value)) || 0;
            const acq = parseInt(removeComma(document.getElementById('acquisitionPrice').value)) || 0;
            const exp = parseInt(removeComma(document.getElementById('necessaryExpenses').value)) || 0;
            const years = parseInt(document.getElementById('holdingYears').value) || 0;
            const resYears = parseInt(document.getElementById('residentYears').value) || 0;
            const type = document.getElementById('assetType').value;

            if (!acq || !trans) return alert('가액 정보를 입력하세요.');

            let profit = Math.max(0, trans - acq - exp);

            if(type === 'house1' && trans > 1200000000) {
                profit = Math.round(profit * (trans - 1200000000) / trans);
            } else if(type === 'house1' && trans <= 1200000000) {
                profit = 0;
            }

            let ltRate = 0;
            if(type === 'house1') {
                ltRate = (Math.min(years, 10) * 0.04) + (Math.min(resYears, 10) * 0.04);
            } else {
                ltRate = Math.min(years, 15) * 0.02;
            }
            const ltDeduction = profit * ltRate;
            const taxBase = Math.max(0, profit - ltDeduction - 2500000);

            let rate = 0, stepDed = 0;
            if(taxBase <= 14000000) { rate = 0.06; stepDed = 0; }
            else if(taxBase <= 50000000) { rate = 0.15; stepDed = 1260000; }
            else if(taxBase <= 88000000) { rate = 0.24; stepDed = 5760000; }
            else if(taxBase <= 150000000) { rate = 0.35; stepDed = 15440000; }
            else if(taxBase <= 300000000) { rate = 0.38; stepDed = 19940000; }
            else if(taxBase <= 500000000) { rate = 0.40; stepDed = 25940000; }
            else if(taxBase <= 1000000000) { rate = 0.42; stepDed = 35940000; }
            else { rate = 0.45; stepDed = 65940000; }

            const tax = (taxBase * rate) - stepDed;
            const typeText = { 'house1': '1세대 1주택', 'houseMulti': '다주택자', 'land': '기타(토지/상가)' };

            document.getElementById('res-asset-type').textContent = typeText[type];
            document.getElementById('res-profit').textContent = addComma(profit) + ' 원';
            document.getElementById('res-longterm-deduction').textContent = addComma(Math.round(ltDeduction)) + ' 원';
            document.getElementById('res-tax-base').textContent = addComma(Math.round(taxBase)) + ' 원';
            document.getElementById('res-total-tax').textContent = addComma(Math.max(0, Math.round(tax * 1.1))) + ' 원';
            
            document.getElementById('transferResult').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        });
    </script>
</body>
</html>
